services:
  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      BOONTORY_DB_PATH: /app/data/boontory.db
      FRONTEND_ORIGIN: https://your-domain.example
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  backend-data:
