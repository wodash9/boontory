services:
  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      BOONTORY_DB_PATH: /app/data/boontory.db
      FRONTEND_ORIGIN: https://boontory.etharlia.com
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      SERVICE_FQDN_FRONTEND_80: https://boontory.etharlia.com
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
