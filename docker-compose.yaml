volumes:
  backend-data:


services:
  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      BOONTORY_DB_PATH: /app/data/boontory.db
      FRONTEND_ORIGIN: https://boontory.etharlia.com
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/books >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
