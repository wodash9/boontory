volumes:
  backend-data:

networks:
  coolify:
    external: true

services:
  backend:
    build:
      context: ./backend
    environment:
      SERVER_PORT: 8080
      BOONTORY_DB_PATH: /app/data/boontory.db
      FRONTEND_ORIGIN: https://boontory.etharlia.com
    volumes:
      - backend-data:/app/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/books >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.docker.network=coolify
      - traefik.http.services.boontory-frontend.loadbalancer.server.port=80
      - traefik.http.routers.https-0-p7naj0uvggxjs36fifqgsyuh-frontend.service=boontory-frontend
      - traefik.http.routers.http-0-p7naj0uvggxjs36fifqgsyuh-frontend.service=boontory-frontend
    restart: unless-stopped
